services:
  mysql:
    image: mysql:8.0
    container_name: itss-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - itss-mysql-data:/var/lib/mysql
      - ./backend/itss.sql:/docker-entrypoint-initdb.d/01-itss.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - itss-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: itss-backend
    restart: unless-stopped
    environment:
      PORT: ${PORT}
      MYSQL_HOST: mysql
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:-your-secret-key-change-in-production}
    ports:
      - "5001:5001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - itss-network

volumes:
  itss-mysql-data:

networks:
  itss-network:
    driver: bridge